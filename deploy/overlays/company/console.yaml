# Console: static SPA behind nginx, same-origin /api + /auth proxy to the
# orchestrator (see console/nginx/default.conf.template). The browser entry is
# the Kong ingress https://jcode.scgzyun.com (ingress.yaml) — matches
# CONSOLE_URL and the OAuth app's company redirect_uri.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  labels:
    app.kubernetes.io/name: console
    app.kubernetes.io/part-of: jcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console
        app.kubernetes.io/part-of: jcloud
    spec:
      containers:
        - name: console
          image: ghcr.io/cnjack/jcloud-console:v0.0.76
          imagePullPolicy: Always
          env:
            - name: ORCHESTRATOR_URL
              value: http://orchestrator:8080
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: console
  labels:
    app.kubernetes.io/name: console
    app.kubernetes.io/part-of: jcloud
spec:
  selector:
    app.kubernetes.io/name: console
  ports:
    - name: http
      port: 80
      targetPort: 80

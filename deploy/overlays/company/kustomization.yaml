# Company-cluster overlay: the jcloud stack in namespace `jcode` on the on-prem
# cluster (context wangwenhui@local), consuming the ghcr.io images CI publishes.
#
# Differences vs the local base:
#   - namespace jcode (namespace.yaml here; base's jcloud namespace not used)
#   - NO gitseed (runs target the real git.scgzyun.com, which shares this
#     cluster — that also makes the @mention webhook reachable in-cluster)
#   - NO mockllm (fail-visible red line #1): a real cluster must NOT default to a
#     mock LLM. A cluster admin sets the model from the console (stored encrypted
#     in cluster_model_config); until then runs surface as "not configured".
#   - images come from ghcr.io (pullPolicy Always via patch; base uses Never)
#   - console Deployment/Service (NodePort 30080) — nginx serving the SPA and
#     proxying /api + /auth to the orchestrator
#   - REAL credentials are applied out-of-band from the gitignored
#     deploy/secrets/orchestrator-secret.company.local.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jcode

resources:
  - namespace.yaml
  - ../../base/postgres
  - ../../base/orchestrator
  - console.yaml
  - ingress.yaml

images:
  - name: jcloud/orchestrator
    newName: ghcr.io/cnjack/jcloud-orchestrator
    newTag: latest

patches:
  # ghcr images must actually be pulled (base pins Never for the local store).
  - target:
      kind: Deployment
      name: orchestrator
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: replace
        path: /spec/template/spec/initContainers/0/imagePullPolicy
        value: Always

  # Environment values over the base ConfigMap. CONSOLE_URL is the browser
  # entry (NodePort); WEBHOOK_URL works because gitea shares this cluster —
  # with WEBHOOK_SECRET set, adding a gitea repo auto-registers its hook.
  # MODEL_* is deliberately NOT patched here (see header note): the model is set
  # from the console, never wired to a mock in a product cluster.
  - target:
      kind: ConfigMap
      name: orchestrator-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: orchestrator-config
      data:
        K8S_NAMESPACE: jcode
        RUNNER_IMAGE: ghcr.io/cnjack/jcloud-runner:latest
        ORCH_BASE_URL: http://orchestrator.jcode.svc.cluster.local:8080
        CONSOLE_URL: https://cloud.j-code.net
        WEBHOOK_URL: http://orchestrator.jcode.svc.cluster.local:8080/webhooks/gitea
        # F5 / D20 — cluster git-host allowlist for project integrations. Mirrors
        # this deployment's real gitea (GITEA_URL in the replayed secret =
        # https://git.scgzyun.com). Comparison is host:port-sensitive
        # (domain.NormalizeGitHost); https default port folds away, so the bare
        # host matches. The local rig (deploy root) keeps this EMPTY — it is a
        # closed e2e environment (explicit mockllm wiring, no external hosts).
        ALLOWED_GIT_HOSTS: git.scgzyun.com
        # Feature C — persistent per-service workspace (D05). Inherits the base
        # default OFF. To enable on this cluster set PERSISTENT_WORKSPACE: "1"
        # (optionally WORKSPACE_PVC_SIZE / WORKSPACE_STORAGE_CLASS). The
        # orchestrator SA already carries the persistentvolumeclaims RBAC via base.
        # PERSISTENT_WORKSPACE: "1"
        #
        # F10 / D23 ③ — object-storage archive layer. This cluster runs NO
        # in-cluster MinIO (base wires one only for the local rig), so the base's
        # S3_ENDPOINT (which points at the jcloud MinIO Service) is BLANKED here:
        # archive stays honestly "object storage not configured" until an admin
        # points it at this cluster's real object store. To enable, set
        # S3_ENDPOINT/S3_BUCKET (+ S3_FORCE_PATH_STYLE for MinIO) here and replay
        # S3_ACCESS_KEY/S3_SECRET_KEY via the gitignored
        # deploy/secrets/orchestrator-secret.company.local.yaml (see the secret
        # placeholder note below) — then flip PERSISTENT_WORKSPACE=1.
        S3_ENDPOINT: ""
        S3_BUCKET: ""
        S3_FORCE_PATH_STYLE: "false"

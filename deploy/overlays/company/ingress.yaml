# Kong ingress for the console — mirrors the jtype-web ingress on this cluster
# (class kong, plain HTTP at the ingress; TLS is terminated by the shared entry
# gateway in front of Kong). cloud.j-code.net already points at that entry
# (same IP as git.scgzyun.com), so the edge routes here by Host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: console
  labels:
    app.kubernetes.io/name: console
    app.kubernetes.io/part-of: jcloud
spec:
  ingressClassName: kong
  rules:
    - host: cloud.j-code.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console
                port:
                  number: 80

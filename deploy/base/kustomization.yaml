apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jcloud
# NOTE: namespace.yaml is intentionally NOT listed here. The `jcloud` namespace
# is treated as pre-existing/externally-owned (per task setup, it's created
# once outside this manifest set); it is applied separately (idempotently) by
# `make up` via `kubectl apply -f base/namespace.yaml`, and `make down` never
# deletes it -- only the resources below. This avoids `kubectl delete -k .`
# tearing down the namespace itself (slow to recreate, and other tenants of
# the namespace would be surprised by that).
resources:
  - postgres
  # minio backs the persistent-workspace archive layer (F10 / D23 ③). It is
  # wired by default in the rig so GET /api/v1/system reports archive object
  # storage as configured; the archive PASS still stays inert until
  # PERSISTENT_WORKSPACE=1 (base default is 0), so this is safe to ship on.
  - minio
  - mockllm
  - gitseed
  # NOTE: the in-cluster gitea Deployment + its gitea-bootstrap Job were
  # removed. This deployment targets the REAL git.scgzyun.com for draft PRs
  # and OAuth login; GITEA_URL/GITEA_TOKEN + AUTH_GITEA_* live directly in
  # base/orchestrator/secret.yaml + configmap.yaml (no bootstrap Job mints
  # them anymore). The git-daemon `gitseed` server is retained (unrelated).
  - orchestrator

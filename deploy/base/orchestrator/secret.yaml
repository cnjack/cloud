# Secret env for the orchestrator (local OrbStack dev only — plaintext in git
# is acceptable for this MVP manifest set, per deploy/README.md caveats).
apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secret
  namespace: jcloud
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: jcloud
type: Opaque
stringData:
  CONSOLE_TOKEN: "dev-console-token"
  DATABASE_URL: "postgres://jcloud:jcloud@postgres:5432/jcloud?sslmode=disable"
  # Dummy key: mockllm does not validate it, but the orchestrator config /
  # runner entrypoint both treat MODEL_API_KEY as required-ish (entrypoint
  # defaults to "dummy-key" if unset, but we set it explicitly for clarity).
  MODEL_API_KEY: "dummy-mock-key"

  # --- Remote Gitea (git.scgzyun.com) draft-PR + OAuth login ---------------
  # This deployment targets a real self-hosted Gitea, NOT an in-cluster one
  # (that Deployment + its gitea-bootstrap Job were removed; see
  # base/kustomization.yaml). The REAL credentials must NEVER be committed:
  # they live in deploy/secrets/orchestrator-secret.local.yaml (gitignored),
  # which `make up` applies OVER this placeholder Secret when present.
  GITEA_URL: ""
  GITEA_TOKEN: ""
  # OAuth2 app on the gitea host (confidential client; redirect_uri must match
  # the orchestrator host the browser reaches for /auth/callback/gitea).
  AUTH_GITEA_CLIENT_ID: ""
  AUTH_GITEA_CLIENT_SECRET: ""
  # 32-byte base64 AES-256 key that encrypts provider identity tokens at rest
  # (internal/auth/crypt.go). Required whenever an AUTH_*_CLIENT_ID is set.
  AUTH_TOKEN_KEY: ""

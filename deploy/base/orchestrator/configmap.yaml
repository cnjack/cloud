# Non-secret orchestrator env, mirroring cloud/orchestrator/.env.example and
# cloud/orchestrator/internal/config/config.go Load(). Secrets (CONSOLE_TOKEN,
# DATABASE_URL, MODEL_API_KEY) live in secret.yaml instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  namespace: jcloud
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: jcloud
data:
  ADDR: ":8080"
  RECONCILE_INTERVAL: "3s"
  MAX_CONCURRENT_RUNS: "4"
  STALL_TIMEOUT: "10m"
  BACKOFF_BASE_MS: "10000"
  BACKOFF_MAX_MS: "300000"

  # KUBECONFIG intentionally left unset (empty) => client-go in-cluster config
  # via the mounted ServiceAccount token. Do NOT set this key here.
  K8S_NAMESPACE: "jcloud"
  RUNNER_IMAGE: "jcloud/runner:dev"
  # Reachable from runner Pods for future ingest callbacks
  # (POST /internal/v1/runs/{id}/events|artifact); Service DNS, in-namespace.
  ORCH_BASE_URL: "http://orchestrator.jcloud.svc.cluster.local:8080"
  # Dedicated, privilege-less ServiceAccount for runner Job pods (see
  # runner-serviceaccount.yaml — automountServiceAccountToken: false, no RBAC
  # bound). Consumed by config.Config.ServiceAccount and set as
  # PodSpec.ServiceAccountName in internal/k8s/client.go buildJob().
  RUNNER_SERVICE_ACCOUNT: "runner"
  JOB_TTL_SECONDS: "3600"
  RUN_TIMEOUT_SECONDS: "1800"
  RUNNER_CPU_LIMIT: "2"
  RUNNER_MEMORY_LIMIT: "4Gi"
  RUNNER_CPU_REQUEST: "500m"
  RUNNER_MEMORY_REQUEST: "1Gi"

  # BYO-model MVP: point at the in-cluster mockllm so runner Jobs can complete
  # an agent loop with no real key (PRD e2e requirement). Swap to a real
  # OpenAI-compatible endpoint for non-demo use.
  MODEL_BASE_URL: "http://mockllm.jcloud.svc.cluster.local:8081/v1"
  # provider/model id written into the runner's jcode config (custom_models).
  MODEL_NAME: "mock/mock-model"

  DISABLE_K8S: "0"

  # --- Auth (docs/13-multitenant-blueprint.md §2) ---
  # Consumed by internal/config.Load (M2): the OAuth login flow reads these
  # dual URLs, and CONSOLE_URL is where /auth/callback 302s back after login.
  # AUTH_GITEA_CLIENT_ID/_CLIENT_SECRET + AUTH_TOKEN_KEY live in secret.yaml
  # (orchestrator-secret), matching the GITEA_URL/GITEA_TOKEN pattern. A
  # provider is "on" iff its CLIENT_ID is set; with none set the system runs on
  # CONSOLE_TOKEN alone (backward compatible). SESSION_TTL is optional (30d).
  #
  # This deployment authenticates against the REAL git.scgzyun.com, so both the
  # browser-facing (authorize redirect) and server-to-server (token exchange +
  # API) URLs are the same public host -- no in-cluster gitea Service anymore.
  AUTH_GITEA_EXTERNAL_URL: "https://git.scgzyun.com"
  AUTH_GITEA_INTERNAL_URL: "https://git.scgzyun.com"
  # Where the OAuth callback 302s back to after a successful login.
  CONSOLE_URL: "http://localhost:5173"

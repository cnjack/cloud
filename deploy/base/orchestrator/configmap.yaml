# Non-secret orchestrator env, mirroring cloud/orchestrator/.env.example and
# cloud/orchestrator/internal/config/config.go Load(). Secrets (CONSOLE_TOKEN,
# DATABASE_URL) live in secret.yaml instead.
#
# NOTE: MODEL_* is intentionally ABSENT here (fail-visible red line #1). The
# effective model config is set by a cluster admin from the console (stored
# encrypted in cluster_model_config) or, for the local e2e rig ONLY, injected as
# env by the ROOT kustomization's mockllm patch (deploy/kustomization.yaml). A
# product deployment must NOT default MODEL_* to a mock — an unconfigured LLM
# surfaces as an honest "not configured" state, never a silent fake run.
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  namespace: jcloud
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: jcloud
data:
  ADDR: ":8080"
  RECONCILE_INTERVAL: "3s"
  MAX_CONCURRENT_RUNS: "4"
  STALL_TIMEOUT: "10m"
  BACKOFF_BASE_MS: "10000"
  BACKOFF_MAX_MS: "300000"

  # KUBECONFIG intentionally left unset (empty) => client-go in-cluster config
  # via the mounted ServiceAccount token. Do NOT set this key here.
  K8S_NAMESPACE: "jcloud"
  RUNNER_IMAGE: "jcloud/runner:dev"
  # Reachable from runner Pods for future ingest callbacks
  # (POST /internal/v1/runs/{id}/events|artifact); Service DNS, in-namespace.
  ORCH_BASE_URL: "http://orchestrator.jcloud.svc.cluster.local:8080"
  # Dedicated, privilege-less ServiceAccount for runner Job pods (see
  # runner-serviceaccount.yaml — automountServiceAccountToken: false, no RBAC
  # bound). Consumed by config.Config.ServiceAccount and set as
  # PodSpec.ServiceAccountName in internal/k8s/client.go buildJob().
  RUNNER_SERVICE_ACCOUNT: "runner"
  JOB_TTL_SECONDS: "3600"
  RUN_TIMEOUT_SECONDS: "1800"
  RUNNER_CPU_LIMIT: "2"
  RUNNER_MEMORY_LIMIT: "4Gi"
  RUNNER_CPU_REQUEST: "500m"
  RUNNER_MEMORY_REQUEST: "1Gi"

  # Persistent workspace (Feature C / D05). OFF by default: every run clones fresh
  # and there is no per-service serialization — today's behaviour, and what the
  # local e2e rig expects. Turn on to give each service a long-lived RWO PVC
  # (ws-<serviceID>) mounted at /workspace + $HOME/.jcode so a later run of the
  # SAME service reuses the checkout and jcode memory (runs then serialize per
  # service). WORKSPACE_STORAGE_CLASS empty => the cluster's default StorageClass.
  # Requires the persistentvolumeclaims RBAC in rbac.yaml.
  PERSISTENT_WORKSPACE: "0"
  WORKSPACE_PVC_SIZE: "10Gi"
  WORKSPACE_STORAGE_CLASS: ""

  # MODEL_* deliberately NOT set here (see header note): configured via the
  # console (DB) in real deployments; re-added as env by the root e2e-rig patch.

  DISABLE_K8S: "0"

  # --- Auth (docs/13-multitenant-blueprint.md §2) ---
  # Consumed by internal/config.Load (M2): the OAuth login flow reads these
  # dual URLs, and CONSOLE_URL is where /auth/callback 302s back after login.
  # AUTH_GITEA_CLIENT_ID/_CLIENT_SECRET + AUTH_TOKEN_KEY live in secret.yaml
  # (orchestrator-secret), matching the GITEA_URL/GITEA_TOKEN pattern. A
  # provider is "on" iff its CLIENT_ID is set; with none set the system runs on
  # CONSOLE_TOKEN alone (backward compatible). SESSION_TTL is optional (30d).
  #
  # This deployment authenticates against the REAL git.scgzyun.com, so both the
  # browser-facing (authorize redirect) and server-to-server (token exchange +
  # API) URLs are the same public host -- no in-cluster gitea Service anymore.
  AUTH_GITEA_EXTERNAL_URL: "https://git.scgzyun.com"
  AUTH_GITEA_INTERNAL_URL: "https://git.scgzyun.com"
  # Where the OAuth callback 302s back to after a successful login.
  CONSOLE_URL: "http://localhost:5173"

  # --- git integrations (Feature F5 / D19+D20) -------------------------------
  # ALLOWED_GIT_HOSTS is the cluster allowlist of git hosts a PROJECT integration
  # may target (comma-separated; canonical "hostname[:port]" comparison — the
  # PORT COUNTS, http/https default ports fold away). Empty => no restriction,
  # which suits ONLY this closed local rig (the explicit-mockllm e2e environment);
  # a real cluster sets it explicitly (see overlays/company: git.scgzyun.com).
  # Enforced at integration create/rotate (400 host_not_allowed) AND at run
  # dispatch for integration-bound services (403), so tightening stops existing
  # integrations immediately. Read-only in the console Cluster page. NOTE: the
  # legacy cluster-wide GITEA_TOKEN (orchestrator secret) is DEPRECATED (D19) in
  # favour of per-project integrations; it remains a fallback only for unbound
  # services.
  ALLOWED_GIT_HOSTS: ""

  # --- jtype kanban integration (Feature E / F6) -----------------------------
  # JTYPE_BASE_URL intentionally NOT set here: the integration is OFF unless a
  # deployment explicitly turns it on (fail-visible red line #1 — no mock
  # default). Since F6 / D25 the base URL ALONE enables the integration: each
  # kanban link carries its own encrypted jtype PAT (managed by the project
  # owner in the console), and the cluster JTYPE_TOKEN in the orchestrator
  # secret is only an optional FALLBACK for links without a per-link token.
  # JTYPE_POLL_INTERVAL has a sane default (15s) so only the base URL needs to
  # be provided.
  JTYPE_POLL_INTERVAL: "15s"

# Namespace-scoped RBAC for the orchestrator's client-go JobLauncher
# (cloud/orchestrator/internal/k8s/client.go). It creates/observes/deletes
# batch/v1 Jobs and (forward-looking, for log tailing / pod-phase inspection
# not yet wired into the reconciler but part of the intended contract) reads
# pods and pod logs. With PERSISTENT_WORKSPACE on (Feature C / D05) it also
# creates/gets/deletes the per-service workspace PersistentVolumeClaims.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator
  namespace: jcloud
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: jcloud
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Per-service persistent workspace PVCs (Feature C / D05): EnsureWorkspacePVC
  # creates/gets them before a Job launches; DeleteWorkspacePVC removes them when
  # a service is deleted. Only exercised when PERSISTENT_WORKSPACE is on, but the
  # grant is harmless otherwise.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  # Runner-image prewarm (console Cluster page "sync runner image", F-prewarm):
  # the orchestrator keeps a DaemonSet of sleeper pods on the runner image so
  # every node has it cached, and restarts those pods on a manual sync.
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["create", "get", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator
  namespace: jcloud
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: jcloud
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: jcloud
roleRef:
  kind: Role
  name: orchestrator
  apiGroup: rbac.authorization.k8s.io

# Dedicated ServiceAccount for runner Job pods (NOT the orchestrator's own SA
# in serviceaccount.yaml). Runner pods execute LLM-driven, per-run agent
# commands (arbitrary shell in the agent loop) and never need to talk to the
# Kubernetes API — unlike the orchestrator's client-go JobLauncher, which does
# and has its own scoped Role/RoleBinding in rbac.yaml.
#
# automountServiceAccountToken: false is the actual fix: without it, runner
# pods would fall back to the namespace 'default' ServiceAccount (or, if
# RUNNER_SERVICE_ACCOUNT pointed at this SA but the token were still mounted)
# and get a live API-server token at /var/run/secrets/kubernetes.io/serviceaccount
# for free — the exact credential exfiltration path the per-run RUN_TOKEN
# design is meant to avoid. No RBAC Role/RoleBinding is bound to this SA: it
# is intentionally privilege-less, so even a mounted token (should one ever
# get force-mounted at the Pod spec level) would be authn-only, authz-nothing.
#
# Wired up via RUNNER_SERVICE_ACCOUNT in configmap.yaml, consumed by
# cloud/orchestrator/internal/config/config.go (Config.ServiceAccount) and set
# as PodSpec.ServiceAccountName in internal/k8s/client.go buildJob(). See
# deploy/README.md for the current status of that wiring.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner
  namespace: jcloud
  labels:
    app.kubernetes.io/name: runner
    app.kubernetes.io/part-of: jcloud
automountServiceAccountToken: false

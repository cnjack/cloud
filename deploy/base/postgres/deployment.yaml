apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: jcloud
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jcloud
spec:
  replicas: 1
  # Postgres with a single ReadWriteOnce PVC must never run >1 replica at a
  # time; Recreate avoids the old pod and new pod both mounting the PVC during
  # a rolling update (which would deadlock scheduling).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: jcloud
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata # avoid postgres complaining about lost+found in the mount root
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "jcloud", "-d", "jcloud"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "jcloud", "-d", "jcloud"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data

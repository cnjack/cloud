# Postgres credentials for the MVP. Local-cluster-only, plaintext in git is
# acceptable here (OrbStack dev cluster, not a real secret store) — do NOT
# reuse this file's values outside local dev.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: jcloud
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jcloud
type: Opaque
stringData:
  POSTGRES_USER: jcloud
  POSTGRES_PASSWORD: jcloud
  POSTGRES_DB: jcloud
  # No DATABASE_URL here on purpose: the postgres container only reads
  # POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB (this Secret is consumed via
  # envFrom in deployment.yaml). The full DSN consumed by the orchestrator
  # (pgx/v5) lives solely in base/orchestrator/secret.yaml's DATABASE_URL —
  # that is the single source of truth. Keeping the same credentials
  # duplicated here would let someone rotate the password by editing this
  # file (the obvious place) while the orchestrator keeps a stale DSN from
  # the other Secret, breaking auth on the next Postgres restart with no
  # manifest pointing at the mismatch. If the user/password ever change,
  # update POSTGRES_USER/POSTGRES_PASSWORD here AND the DSN in
  # base/orchestrator/secret.yaml together.

# Postgres credentials for the MVP. Local-cluster-only, plaintext in git is
# acceptable here (OrbStack dev cluster, not a real secret store) — do NOT
# reuse this file's values outside local dev.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: jcloud
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jcloud
type: Opaque
stringData:
  POSTGRES_USER: jcloud
  POSTGRES_PASSWORD: jcloud
  POSTGRES_DB: jcloud
  # Full DSN consumed by the orchestrator (pgx/v5). Host is the Service DNS
  # name below (ClusterIP, resolves in-namespace as just "postgres").
  DATABASE_URL: "postgres://jcloud:jcloud@postgres:5432/jcloud?sslmode=disable"

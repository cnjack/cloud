apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: jcloud
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jcloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # No storageClassName pinned: OrbStack ships a default dynamic provisioner.

# mockllm — scripted OpenAI-compatible LLM so runner Jobs can complete an
# agent loop in-cluster without a real API key (PRD e2e requirement, IN-1).
# Source: cloud/runner/mockllm (untouched); built into its own image by
# deploy/mockllm/Dockerfile (see deploy/Makefile `build-mockllm`).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mockllm
  namespace: jcloud
  labels:
    app.kubernetes.io/name: mockllm
    app.kubernetes.io/part-of: jcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mockllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mockllm
        app.kubernetes.io/part-of: jcloud
    spec:
      containers:
        - name: mockllm
          image: jcloud/mockllm:dev
          imagePullPolicy: Never # locally built; OrbStack shares the Docker image store.
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: MOCK_ADDR
              value: ":8081"
            - name: MOCK_SCENARIO
              value: "write_file"
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi

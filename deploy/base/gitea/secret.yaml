# Gitea bootstrap credentials (local OrbStack dev only — plaintext in git is
# acceptable for this MVP manifest set, per deploy/README.md caveats). These seed
# the headless install: the admin user the bootstrap Job mints the API token as.
#
# The orchestrator does NOT read this Secret. It consumes GITEA_URL + GITEA_TOKEN
# from the SEPARATE `gitea-orchestrator` Secret that the bootstrap Job writes at
# runtime (the token is minted at bootstrap, not known at manifest-authoring
# time). See base/gitea/bootstrap-job.yaml + orchestrator/deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: gitea-secret
  namespace: jcloud
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: jcloud
type: Opaque
stringData:
  GITEA_ADMIN_USER: "jcloud-admin"
  GITEA_ADMIN_PASSWORD: "jcloud-admin-pass-123"
  GITEA_ADMIN_EMAIL: "admin@jcloud.local"

# gitea-bootstrap — one-shot Job that provisions the Gitea org/repo/token and
# writes the orchestrator's GITEA_URL/GITEA_TOKEN Secret (see
# bootstrap-configmap.yaml for the script). It is idempotent, so a rerun (e.g.
# `kubectl apply` after a name change, or `make gitea-bootstrap`) is safe.
#
# It runs on the alpine/k8s image (bundles curl + kubectl + git + sh), which is
# all the script needs. backoffLimit gives it a few retries while Gitea's first
# boot finishes migrations.
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-bootstrap
  namespace: jcloud
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: jcloud
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
        app.kubernetes.io/part-of: jcloud
    spec:
      serviceAccountName: gitea-bootstrap
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: alpine/k8s:1.29.4
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: GITEA_URL
              value: "http://gitea.jcloud.svc.cluster.local:3000"
            - name: GITEA_ORG
              value: "jcloud"
            - name: GITEA_REPO
              value: "seed"
            - name: GITEA_ORCH_SECRET
              value: "gitea-orchestrator"
          envFrom:
            - secretRef:
                name: gitea-secret
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: gitea-bootstrap-script
            defaultMode: 0755

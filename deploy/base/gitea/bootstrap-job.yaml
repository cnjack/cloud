# gitea-bootstrap — one-shot Job that provisions the Gitea org/repo/token +
# the M1b OAuth2 login app + AUTH_TOKEN_KEY, and writes them all into the
# orchestrator's `gitea-orchestrator` Secret (see bootstrap-configmap.yaml for
# the script). It is idempotent, so a rerun (e.g. `kubectl apply` after a name
# change, or `make gitea-bootstrap`) is safe.
#
# It runs on the alpine/k8s image (bundles curl + kubectl + git + sh, plus
# python3 + coreutils base64/head/tr used by the OAuth app + AUTH_TOKEN_KEY
# steps — there is no openssl binary in this image), which is all the script
# needs. backoffLimit gives it a few retries while Gitea's first boot finishes
# migrations.
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-bootstrap
  namespace: jcloud
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: jcloud
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
        app.kubernetes.io/part-of: jcloud
    spec:
      serviceAccountName: gitea-bootstrap
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: alpine/k8s:1.29.4
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: GITEA_URL
              value: "http://gitea.jcloud.svc.cluster.local:3000"
            - name: GITEA_ORG
              value: "jcloud"
            - name: GITEA_REPO
              value: "seed"
            - name: GITEA_ORCH_SECRET
              value: "gitea-orchestrator"
            # OAuth2 app the console's "Login with Gitea" flow authenticates
            # against (M1b). The redirect URI is the orchestrator's own
            # callback route, reached via `make port-forward` (localhost:8080)
            # -- NOT the console dev server -- so it stays constant regardless
            # of AUTH_GITEA_EXTERNAL_URL.
            - name: GITEA_OAUTH_APP_NAME
              value: "jcloud-console"
            - name: GITEA_OAUTH_REDIRECT_URI
              value: "http://localhost:8080/auth/callback/gitea"
          envFrom:
            - secretRef:
                name: gitea-secret
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: gitea-bootstrap-script
            defaultMode: 0755

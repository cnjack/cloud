# RBAC for the gitea-bootstrap Job: it writes the minted Gitea token into the
# `gitea-orchestrator` Secret, so it needs to create/get/update/patch Secrets in
# the jcloud namespace (and nothing else).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-bootstrap
  namespace: jcloud
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: jcloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-bootstrap
  namespace: jcloud
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: jcloud
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-bootstrap
  namespace: jcloud
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: jcloud
subjects:
  - kind: ServiceAccount
    name: gitea-bootstrap
    namespace: jcloud
roleRef:
  kind: Role
  name: gitea-bootstrap
  apiGroup: rbac.authorization.k8s.io

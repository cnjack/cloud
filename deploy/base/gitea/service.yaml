apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: jcloud
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: jcloud
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: ssh
      port: 22
      targetPort: 22

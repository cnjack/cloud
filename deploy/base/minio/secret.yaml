# MinIO root credentials for the local OrbStack rig (F10 / D23 ③ archive layer).
# Local-cluster-only, plaintext in git is acceptable here (dev cluster, not a
# real secret store) — do NOT reuse these values outside local dev. The company
# overlay uses a real object store whose credentials come from the gitignored
# deploy/secrets/*.local.yaml (see overlays/company).
#
# These MUST match the S3_ACCESS_KEY / S3_SECRET_KEY the orchestrator reads
# (base/orchestrator/secret.yaml): the orchestrator signs presigned URLs with
# them, and MinIO validates the signature against the same root credentials.
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: jcloud
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: jcloud
type: Opaque
stringData:
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin

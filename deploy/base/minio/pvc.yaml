apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: jcloud
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: jcloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # No storageClassName pinned: OrbStack ships a default dynamic provisioner.

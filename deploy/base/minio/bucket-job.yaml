# One-shot bucket bootstrap for the archive layer (F10 / D23 ③). MinIO's server
# does not auto-create buckets, so this Job waits for MinIO to come up and then
# creates the workspace-archive bucket (idempotent: --ignore-existing). The
# bucket name MUST match S3_BUCKET in base/orchestrator/configmap.yaml.
#
# A Job's pod template is immutable, so `kubectl apply -k` after the Job has run
# leaves the completed Job as-is (the bucket already exists — that is fine). To
# re-run it (e.g. after wiping the MinIO PVC) delete the Job first.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-setup
  namespace: jcloud
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: jcloud
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: jcloud
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: minio-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio..."; sleep 2
              done
              mc mb --ignore-existing local/jcloud-workspaces
              echo "bucket jcloud-workspaces ready"

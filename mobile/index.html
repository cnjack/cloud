<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#111111" />
    <title>jcode</title>
    <script>
      // Dark-first theme stamp (localStorage choice > OS preference > dark),
      // before first paint so there is no flash.
      (function () {
        var t = null;
        try { t = localStorage.getItem('jmobile_theme'); } catch (e) {}
        if (t !== 'dark' && t !== 'light') {
          t = 'dark'; // mobile is dark-first (docs/17 §7.2)
        }
        document.documentElement.dataset.theme = t;
        // jcode-ui's scoped dark blocks key off the .dark class (M14).
        document.documentElement.classList.toggle('dark', t === 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

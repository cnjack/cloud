name: console-ci

on:
  pull_request:
    paths:
      - "console/**"
      - ".github/workflows/console-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: console-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, typecheck, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/console
    steps:
      # M14 transition: console depends on jcode-ui/jcode-ui-core via
      # unpublished file: paths into the sibling jcode repo (../../jcode from
      # cloud/console). Check both repos out side by side so those paths
      # resolve, and build the jcode packages before pnpm install — pnpm packs
      # the file: directories into its store at install time, so dist/ must
      # already exist. Goes away once jcode-ui is published to the registry.
      - uses: actions/checkout@v4
        with:
          path: cloud
      # Pinned to the feature branch while it is unmerged — main does not
      # carry the jcode-ui/product export yet. Drop `ref:` after the merge.
      - uses: actions/checkout@v4
        with:
          repository: cnjack/jcode
          ref: feat/jcode-device-relay
          path: jcode
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cloud/console/pnpm-lock.yaml
      - name: Build jcode-ui packages
        working-directory: jcode/packages/jcode-ui-core
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build jcode-ui
        working-directory: jcode/packages/jcode-ui
        run: pnpm build
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Run typecheck
        run: pnpm typecheck
      - name: Check design tokens
        run: pnpm lint:tokens
      - name: Build production bundle
        run: pnpm build

  image:
    name: Build console image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # M14 transition: the docker build context is console/ only, so the
      # sibling-checkout trick from the verify job cannot work here. Instead
      # the prepare script packs jcode-ui/jcode-ui-core into console/.pkg/
      # and temporarily rewrites the manifests/lockfile/Dockerfile to the
      # tarballs. Delete this once jcode-ui is published to the registry.
      # Pinned to the feature branch while it is unmerged (main lacks the
      # jcode-ui/product export); drop `ref:` after the merge.
      - uses: actions/checkout@v4
        with:
          repository: cnjack/jcode
          ref: feat/jcode-device-relay
          path: jcode
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Pack jcode-ui into console/.pkg
        env:
          JCODE_REPO: ${{ github.workspace }}/jcode
        run: node console/scripts/prepare-jcode-ui.mjs
      - uses: docker/setup-buildx-action@v3
      - name: Build image without publishing
        uses: docker/build-push-action@v6
        with:
          context: console
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=console-pr
          cache-to: type=gha,mode=max,scope=console-pr

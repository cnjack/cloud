name: console-ci

on:
  pull_request:
    paths:
      - "console/**"
      - ".github/workflows/console-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: console-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, typecheck, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: console/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Run typecheck
        run: pnpm typecheck
      - name: Check design tokens
        run: pnpm lint:tokens
      - name: Build production bundle
        run: pnpm build

  image:
    name: Build console image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image without publishing
        uses: docker/build-push-action@v6
        with:
          context: console
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=console-pr
          cache-to: type=gha,mode=max,scope=console-pr

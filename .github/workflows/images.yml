# Build + push the jcloud images to GitHub Packages (ghcr.io), and cut a release.
#
# Every push to main is a release: the `version` job bumps the patch of the
# latest vX.Y.Z git tag (starting at 0.0.1 when there are none), all four image
# jobs push `<version>` + `latest` (+ the commit SHA for traceability), and the
# final `release` job creates the matching `v<version>` git tag — but only after
# every image has been pushed, so a failed build never leaves a dangling tag.
#
# Images (all linux/amd64 — the target company cluster is amd64-only):
#   ghcr.io/<owner>/jcloud-orchestrator   from orchestrator/
#   ghcr.io/<owner>/jcloud-runner         from runner/ (jcode compiled from the
#                                         public cnjack/jcode checkout)
#   ghcr.io/<owner>/jcloud-console        from console/ (vite build + nginx)
#   ghcr.io/<owner>/jcloud-mockllm        from deploy/mockllm/Dockerfile
name: images

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize releases so two overlapping runs can't compute the same version.
concurrency:
  group: images-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: bump
        name: Compute next patch version
        run: |
          git fetch --tags --force
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            version=0.0.1
          else
            v=${latest#v}
            major=${v%%.*}
            rest=${v#*.}
            minor=${rest%%.*}
            patch=${rest##*.}
            version="$major.$minor.$((patch + 1))"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${latest:-<none>} -> next: v$version"

  orchestrator:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/jcloud-orchestrator
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: orchestrator
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=v${{ needs.version.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator

  runner:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # The runner image bundles the jcode headless binary, compiled from the
      # jcode repo (public) — same layout runner/build.sh expects.
      - uses: actions/checkout@v4
        with:
          repository: cnjack/jcode
          path: jcode
      - uses: actions/setup-go@v5
        with:
          go-version-file: jcode/go.mod
          # orchclient/mockllm are stdlib-only (no go.sum).
          cache-dependency-path: |
            jcode/go.sum
            runner/acpdrive/go.sum
      - name: Compile runner binaries (linux/amd64)
        run: JCODE_SRC="$GITHUB_WORKSPACE/jcode" TARGETARCH=amd64 SKIP_DOCKER=1 ./runner/build.sh
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/jcloud-runner
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  console:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/jcloud-console
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: console
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=console
          cache-to: type=gha,mode=max,scope=console

  mockllm:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/jcloud-mockllm
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/mockllm/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    # Tag only once every image for this version has been pushed, so the git tag
    # always corresponds to a fully published release.
    needs: [version, orchestrator, runner, console, mockllm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push v${{ needs.version.outputs.version }} tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

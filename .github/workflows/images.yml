# Build + push the jcloud images to GitHub Packages (ghcr.io), and cut a release.
#
# Every push to main is a release. VERSION is the single source of truth:
# package manifests must match it, the Console and orchestrator display
# `v<version>`, all four images push `v<version>` + `latest` (+ the commit SHA
# for traceability), and the final job creates the same `v<version>` Git tag.
# The tag is created only after every image has been pushed, so a failed build
# never leaves a dangling release tag.
#
# Images (all linux/amd64 — the target company cluster is amd64-only):
#   ghcr.io/<owner>/jcloud-orchestrator   from orchestrator/
#   ghcr.io/<owner>/jcloud-runner         from runner/ (jcode compiled from the
#                                         public cnjack/jcode checkout)
#   ghcr.io/<owner>/jcloud-console        from console/ (vite build + nginx)
#   ghcr.io/<owner>/jcloud-mockllm        from deploy/mockllm/Dockerfile
name: images

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize releases so two overlapping runs cannot publish the same version.
concurrency:
  group: images-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: release
        name: Validate release version
        run: |
          git fetch --tags --force
          version=$(tr -d '[:space:]' < VERSION)
          case "$version" in
            ''|*[!0-9.]*|.*|*.) echo "VERSION must be X.Y.Z, got '$version'" >&2; exit 1 ;;
          esac
          [ "$(printf '%s' "$version" | awk -F. '{print NF}')" -eq 3 ] || {
            echo "VERSION must be X.Y.Z, got '$version'" >&2
            exit 1
          }
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            echo "release tag v$version already exists; bump VERSION first" >&2
            exit 1
          fi
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)
          if [ -n "$latest" ] &&
             [ "$(printf '%s\n%s\n' "$latest" "v$version" | sort -V | tail -n1)" != "v$version" ]; then
            echo "VERSION v$version must be newer than latest tag $latest" >&2
            exit 1
          fi
          node scripts/check-release-version.mjs
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: v$version"

  orchestrator:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/jcloud-orchestrator
          tags: |
            type=raw,value=v${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: orchestrator
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=v${{ needs.version.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator

  runner:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # The runner image bundles the jcode headless binary, compiled from the
      # jcode repo (public) — same layout runner/build.sh expects.
      - uses: actions/checkout@v4
        with:
          repository: cnjack/jcode
          path: jcode
      - uses: actions/setup-go@v5
        with:
          go-version-file: jcode/go.mod
          # orchclient/mockllm are stdlib-only (no go.sum).
          cache-dependency-path: |
            jcode/go.sum
            runner/acpdrive/go.sum
      - name: Compile runner binaries (linux/amd64)
        run: JCODE_SRC="$GITHUB_WORKSPACE/jcode" TARGETARCH=amd64 SKIP_DOCKER=1 ./runner/build.sh
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/jcloud-runner
          tags: |
            type=raw,value=v${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  console:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # M14 transition: console depends on jcode-ui/jcode-ui-core via
      # unpublished file: paths into the sibling jcode repo, which is outside
      # the docker build context (console/). The prepare script packs both
      # packages into console/.pkg/ and temporarily rewrites the
      # manifests/lockfile/Dockerfile to the tarballs. Delete this once
      # jcode-ui is published to the registry.
      - uses: actions/checkout@v4
        with:
          repository: cnjack/jcode
          path: jcode
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Pack jcode-ui into console/.pkg
        env:
          JCODE_REPO: ${{ github.workspace }}/jcode
        run: node console/scripts/prepare-jcode-ui.mjs
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/jcloud-console
          tags: |
            type=raw,value=v${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: console
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=v${{ needs.version.outputs.version }}
          cache-from: type=gha,scope=console
          cache-to: type=gha,mode=max,scope=console

  mockllm:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/jcloud-mockllm
          tags: |
            type=raw,value=v${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/mockllm/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    # Tag only once every image for this version has been pushed, so the git tag
    # always corresponds to a fully published release. Only main cuts releases —
    # workflow_dispatch from a feature branch builds/pushes images without a tag.
    if: github.ref == 'refs/heads/main'
    needs: [version, orchestrator, runner, console, mockllm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push v${{ needs.version.outputs.version }} tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

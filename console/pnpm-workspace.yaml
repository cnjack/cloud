packages:
  - packages/*
overrides:
  # M14: consume the local (unpublished) jcode-ui product composer build.
  # jcode-ui's own manifest says "jcode-ui-core": "workspace:*", which only
  # resolves inside the jcode repo — pin both to the sibling checkouts.
  jcode-ui: file:../../jcode/packages/jcode-ui
  jcode-ui-core: file:../../jcode/packages/jcode-ui-core
allowBuilds:
  esbuild: true
minimumReleaseAgeExclude:
  - jcode-ui-core@0.1.0
  - jcode-ui@0.1.1
  - jtype-board-react@0.1.0
